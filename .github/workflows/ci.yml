name: Fider SCC CI Pipeline

on:
  push:
    branches: [ main, 'features/**' ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:14
        env:
          POSTGRES_USER: fider
          # Note: Ensure this matches your app's test config
          POSTGRES_DB: fider_test 
          POSTGRES_PASSWORD: fider # Added a default password for stability
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go & Node
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # FIX 1: Point to the correct folder for permissions
      - name: Grant execute permission for gradlew
        run: chmod +x scc-automation/gradlew

      # FIX 2: Run Gradle from the subfolder using -p (project-dir)
      # Also pointed -b to your specific build file
      - name: Run Build Automation (Task 1 & 2)
        run: ./scc-automation/gradlew -p scc-automation -b scc-automation/build.gradle packageApp

      # FIX 3: Point Docker to your custom Dockerfile
      - name: Build Docker Image (Task 3)
        run: docker build -t fider-scc:${{ github.sha }} -f scc-automation/scc.Dockerfile .

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            scc-report.xml
            scc-coverage.out
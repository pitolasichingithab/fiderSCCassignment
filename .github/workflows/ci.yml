name: Fider SCC CI Pipeline

on:
  push:
    branches: [ main, 'features/**' ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:14
        env:
          POSTGRES_USER: fider
          POSTGRES_DB: fider_test 
          POSTGRES_PASSWORD: fider 
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go & Node
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies, Setup V8 Header
        run: |
          sudo apt-get update
          sudo apt-get install -y libnode-dev build-essential zip
          sudo rm -rf /usr/include/v8
          sudo mkdir -p /usr/include/v8
          sudo ln -s /usr/include/node/* /usr/include/v8/
          ls -l /usr/include/v8

      - name: Grant gradlew permission     
        run: chmod +x sccautomation/gradlew  

      - name: Run Build Automation Pipeline
        run: ./sccautomation/gradlew -p sccautomation validateBuild
        env:
          DATABASE_URL: postgres://fider:fider@localhost:5432/fider_test?sslmode=disable
          JWT_SECRET: ci_test_secret

      - name: Build Docker Image
        run: docker build -t fider-scc:${{ github.sha }} -f sccautomation/Dockerfile .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fider-build-package
          path: |
            sccautomation/build/reports/build-report.txt
            build/dist/fider-application.zip
          if-no-files-found: error
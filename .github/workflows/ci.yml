name: Fider SCC CI Pipeline

on:
  push:
    branches: [ main, 'features/**' ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:14
        env:
          POSTGRES_USER: fider
          POSTGRES_DB: fider_test 
          POSTGRES_PASSWORD: fider 
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go & Node
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # STEP 1: Run the Makefile orchestration
      - name: Run Build Automation (Makefile)
        working-directory: ./sccautomation
        run: make validateBuild

      # STEP 2: Build Docker Image (Task 3)
      - name: Build Docker Image
        run: docker build -t fider-scc:${{ github.sha }} -f sccautomation/Dockerfile .

      # STEP 3: Upload the correct files generated by the Makefile
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fider-scc-assets
          path: |
            sccautomation/build/reports/build-report.txt
            build/dist/fider-application.zip
          if-no-files-found: error
name: Fider SCC CI Pipeline

on:
  push:
    branches: [ main, 'features/**' ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:14
        env:
          POSTGRES_USER: fider
          # Note: Ensure this matches your app's test config
          POSTGRES_DB: fider_test 
          POSTGRES_PASSWORD: fider # Added a default password for stability
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go & Node
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # STEP 1: Point to the correct folder for permissions
      - name: Grant execute permission for gradlew
        run: chmod +x sccautomation/gradlew

      # STEP 2: Run Gradle from the subfolder using -p (project-dir)
      # Also pointed -b to your specific build file
      - name: Run Build Automation
        run: ./sccautomation/gradlew -p sccautomation checkPrerequisites

      - name: Resolve Dependencies
        run: ./sccautomation/gradlew -p sccautomation resolveDependencies

      - name: Compile Source Code 
        run: ./sccautomation/gradlew -p sccautomation compileSourceCode

      - name: package Application
        run: ./sccautomation/gradlew -p sccautomation packageApp

      - name: generate Build Reports
        run: ./sccautomation/gradlew -p sccautomation generateReport

      - name: generate Code Coverage
        run: ./sccautomation/gradlew -p sccautomation generateCoverage

      - name: Validate Build (Task 5)
        run: ./sccautomation/gradlew -p sccautomation validateBuild

      # STEP 3: Point Docker to your custom Dockerfile
      - name: Build Docker Image (Task 3)
        run: docker build -t fider-scc:${{ github.sha }} -f sccautomation/Dockerfile .

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            sccautomation/build/reports/build-report.txt
            sccautomation/build/reports/coverage.outtatu
            sccautomation/build/dist/fider-application.zip
name: Fider CI Pipeline

on:
  push:
    branches:
      - main
      - stable
      - develop
  pull_request:
    branches:
      - main
      - stable

jobs:
  precheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check and install Node.js
        shell: bash
        run: |
          if command -v node >/dev/null 2>&1; then
            echo "Node.js already installed"
            node -v
          else
            echo "Node.js not found, installing..."
            sudo apt-get update
            sudo apt-get install -y nodejs npm
          fi

      - name: Check and install npm packages
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci --maxsockets 1
          else
            echo "package.json not found"
          fi

      - name: Check and install Go
        shell: bash
        run: |
          if command -v go >/dev/null 2>&1; then
            echo "Go already installed"
            go version
          else
            echo "Go not found, installing..."
            sudo apt-get update
            sudo apt-get install -y golang-go
          fi

      - name: Check Docker
        shell: bash
        run: |
          if command -v docker >/dev/null 2>&1; then
            echo "Docker already installed"
            docker --version
          else
            echo "Docker not found"
            exit 1
          fi

      - name: Check Docker Compose
        shell: bash
        run: |
          if docker compose version >/dev/null 2>&1; then
            echo "Docker Compose already available"
            docker compose version
          else
            echo "Docker Compose not found"
            exit 1
          fi

      - name: Create precheck report
        run: |
          mkdir -p reports
          cat > reports/precheck-summary.md << EOF
          # Precheck Report

          Verified tools:
          - Node.js
          - npm
          - Go
          - Docker
          - Docker Compose

          Frontend dependencies:
          - Installed with npm ci
          EOF

      - name: Upload precheck artifacts
        uses: actions/upload-artifact@v4
        with:
          name: precheck-artifacts
          path: reports/precheck-summary.md
          if-no-files-found: warn

  build:
    runs-on: ubuntu-latest
    needs: precheck

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Create report folders
        run: |
          mkdir -p reports out

      - name: Install dependencies
        run: npm ci --maxsockets 1

      - name: Build Docker image
        run: |
          SHA7=$(echo "${GITHUB_SHA}" | cut -c1-7)
          docker build \
            --tag fider-image:latest \
            --tag fider-image:${SHA7} \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${SHA7}" \
            . > docker-build.log 2>&1

          docker image inspect fider-image:latest > image-info.json
          echo "${SHA7}" > out/sha7
          echo "${GITHUB_REF_NAME}" > out/ref

          cat > out/build-metadata.json << EOF
          {
            "commit": "${GITHUB_SHA}",
            "short_commit": "${SHA7}",
            "branch": "${GITHUB_REF_NAME}"
          }
          EOF

      - name: Generate build report
        run: |
          cat > reports/build-summary.md << EOF
          # Build Report

          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}

          Artifacts:
          - docker-build.log
          - image-info.json
          - out/build-metadata.json
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            reports/build-summary.md
            docker-build.log
            image-info.json
            out/build-metadata.json
          if-no-files-found: warn

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create report folders
        run: mkdir -p reports

      - name: Install dependencies
        run: npm ci --maxsockets 1

      - name: Run frontend unit tests with coverage
        run: |
          npx jest ./public \
            --coverage \
            --coverageReporters=text \
            --coverageReporters=html \
            --coverageReporters=json \
            --passWithNoTests > test-output.txt 2>&1

      - name: Generate test report
        run: |
          cat > reports/test-summary.md << EOF
          # Test Report

          Artifacts:
          - test-output.txt
          - coverage/
          - coverage-final.json
          EOF

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            reports/test-summary.md
            test-output.txt
            coverage/
            coverage-final.json
          if-no-files-found: warn

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Create report folders
        run: mkdir -p reports

      - name: Prepare environment file
        run: |
          if [ -f .example.env ]; then
            cp .example.env .env
          elif [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Deploy with Docker Compose
        run: |
          echo "Starting deployment..." > deploy-output.txt
          docker compose down >> deploy-output.txt 2>&1 || true
          docker compose up -d --build >> deploy-output.txt 2>&1

      - name: Check deployment status
        run: |
          docker compose ps > deploy-ps.txt
          docker compose logs --tail=100 > deploy-logs.txt

      - name: Generate deployment report
        run: |
          cat > reports/deployment-summary.md << EOF
          # Deployment Report

          Artifacts:
          - deploy-output.txt
          - deploy-ps.txt
          - deploy-logs.txt
          EOF

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            reports/deployment-summary.md
            deploy-output.txt
            deploy-ps.txt
            deploy-logs.txt
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: docker compose down -v